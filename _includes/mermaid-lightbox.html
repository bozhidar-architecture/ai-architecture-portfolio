<style>
  .mermaid { cursor: zoom-in; position: relative; }
  .mermaid svg { max-width: 100%; height: auto; }
  .mermaid-enlarge-btn {
    position: absolute; top: 6px; right: 10px;
    font-size: 0.7em; opacity: 0.8;
    background: rgba(255,255,255,0.85); color: #1a1a2e;
    border: 1px solid #4a90d9; border-radius: 4px;
    padding: 2px 8px; cursor: pointer; line-height: 1.4;
  }
  .mermaid-enlarge-btn:hover { opacity: 1; }
  .mermaid-enlarge-btn:focus-visible {
    outline: 2px solid #4a90d9; outline-offset: 2px; opacity: 1;
  }
  #diagram-lightbox {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(10, 12, 20, 0.9);
    cursor: zoom-out; padding: 2vh 2vw;
    align-items: center; justify-content: center;
  }
  #diagram-lightbox.open { display: flex; }
  #diagram-lightbox svg {
    max-width: 96vw; max-height: 92vh;
    width: auto; height: auto;
    background: #fff; border-radius: 8px; padding: 1.5rem;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  #diagram-lightbox .close-hint {
    position: fixed; top: 16px; right: 24px;
    color: #fff; font-size: 1.6em; opacity: 0.8; cursor: pointer;
    line-height: 1;
  }
  #diagram-lightbox .close-hint:focus-visible {
    outline: 2px solid #fff; outline-offset: 2px;
  }
</style>

<script type="module">
  // Mermaid version is exact-pinned (not "@11" floating). SRI isn't applied here: the
  // `integrity` attribute only applies to <script src> and <link> fetches, not to a
  // dynamic `import` inside a module script — exact-version pinning is the mitigation.
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11.16.0/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: false, theme: 'base', themeVariables: { primaryColor: '#e8f4f8', primaryTextColor: '#1a1a2e', primaryBorderColor: '#4a90d9', lineColor: '#4a90d9', secondaryColor: '#f0f7ee', tertiaryColor: '#fff8e7' }});

  await mermaid.run({ querySelector: '.mermaid' });

  // Lightbox: enlarge a diagram via the "Enlarge" button (keyboard/screen-reader path)
  // or by clicking the diagram itself (mouse convenience); close via the close control,
  // Escape, or clicking the overlay, and return focus to whatever opened it.
  const overlay = document.createElement('div');
  overlay.id = 'diagram-lightbox';
  overlay.setAttribute('role', 'dialog');
  overlay.setAttribute('aria-modal', 'true');
  overlay.setAttribute('aria-label', 'Enlarged diagram');
  overlay.setAttribute('tabindex', '-1');
  overlay.innerHTML = '<span class="close-hint" role="button" tabindex="0" aria-label="Close">&times;</span>';
  document.body.appendChild(overlay);
  const closeHint = overlay.querySelector('.close-hint');

  let lastTrigger = null;

  const openLightbox = (el, trigger) => {
    const svg = el.querySelector('svg');
    if (!svg) return;
    const clone = svg.cloneNode(true);
    clone.removeAttribute('style');
    overlay.appendChild(clone);
    overlay.classList.add('open');
    lastTrigger = trigger || el;
    closeHint.focus();
  };

  const closeLightbox = () => {
    overlay.classList.remove('open');
    const svg = overlay.querySelector('svg');
    if (svg) svg.remove();
    if (lastTrigger) { lastTrigger.focus(); lastTrigger = null; }
  };

  document.querySelectorAll('.mermaid').forEach(el => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'mermaid-enlarge-btn';
    btn.textContent = '⤢ Enlarge';
    btn.setAttribute('aria-label', 'Enlarge diagram');
    el.appendChild(btn);

    btn.addEventListener('click', e => {
      e.stopPropagation();
      openLightbox(el, btn);
    });

    el.addEventListener('click', () => openLightbox(el, el));
  });

  overlay.addEventListener('click', closeLightbox);
  closeHint.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ' || e.key === 'Escape') {
      e.preventDefault();
      closeLightbox();
    }
  });

  // Trap Tab focus inside the overlay while it is open.
  overlay.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    const focusables = Array.from(overlay.querySelectorAll('button, [tabindex="0"]'));
    if (focusables.length === 0) { e.preventDefault(); return; }
    e.preventDefault();
    const idx = focusables.indexOf(document.activeElement);
    const nextIdx = e.shiftKey
      ? (idx <= 0 ? focusables.length - 1 : idx - 1)
      : (idx === focusables.length - 1 ? 0 : idx + 1);
    focusables[nextIdx].focus();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && overlay.classList.contains('open')) closeLightbox();
  });
</script>
